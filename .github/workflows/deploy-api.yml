name: Deploy AutoWala API to Production

on:
  push:
    branches: [main]
    paths:
      - 'autowala-backend/**'
      - '.github/workflows/deploy-api.yml'

  # Manual trigger
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: autowala-api
  ECS_SERVICE: autowala-api
  ECS_CLUSTER: autowala-cluster
  ECS_TASK_DEFINITION: autowala-api

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: autowala_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: autowala_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, bcmath, ctype, fileinfo, json, mbstring, tokenizer, xml, curl, redis
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: ./autowala-backend
        run: composer install --prefer-dist --no-interaction --no-scripts

      - name: Create environment file
        working-directory: ./autowala-backend
        run: |
          cp .env.testing .env
          php artisan key:generate

      - name: Run database migrations
        working-directory: ./autowala-backend
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: autowala_test
          DB_USERNAME: autowala_test
          DB_PASSWORD: test_password

      - name: Run PHPUnit tests
        working-directory: ./autowala-backend
        run: php artisan test --coverage-clover coverage.xml
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: autowala_test
          DB_USERNAME: autowala_test
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./autowala-backend/coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './autowala-backend'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [test, security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd autowala-backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition $ECS_TASK_DEFINITION --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: autowala-api
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Run database migrations in production
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster $ECS_CLUSTER --service $ECS_SERVICE --query 'taskArns[0]' --output text)
          aws ecs execute-command \
            --cluster $ECS_CLUSTER \
            --task $TASK_ARN \
            --container autowala-api \
            --interactive \
            --command "php artisan migrate --force"

      - name: Clear application cache
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster $ECS_CLUSTER --service $ECS_SERVICE --query 'taskArns[0]' --output text)
          aws ecs execute-command \
            --cluster $ECS_CLUSTER \
            --task $TASK_ARN \
            --container autowala-api \
            --interactive \
            --command "php artisan optimize:clear && php artisan config:cache && php artisan route:cache"

      - name: Verify deployment
        run: |
          echo "Deployment completed successfully!"
          echo "Image: ${{ steps.build-image.outputs.image }}"
          echo "Task Definition: ${{ steps.task-def.outputs.task-definition }}"

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()

    steps:
      - name: Notify Slack on success
        if: needs.build-and-deploy.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "✅ AutoWala API deployed successfully to production!"
          SLACK_TITLE: Deployment Success
          SLACK_COLOR: good

      - name: Notify Slack on failure
        if: needs.build-and-deploy.result == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ AutoWala API deployment failed!"
          SLACK_TITLE: Deployment Failed
          SLACK_COLOR: danger