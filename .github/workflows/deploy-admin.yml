name: Deploy AutoWala Admin Panel to Production

on:
  push:
    branches: [main]
    paths:
      - 'autowala-admin/**'
      - '.github/workflows/deploy-admin.yml'

  # Manual trigger
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: autowala-admin
  ECS_SERVICE: autowala-admin
  ECS_CLUSTER: autowala-cluster
  ECS_TASK_DEFINITION: autowala-admin

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: autowala-admin/package-lock.json

      - name: Install dependencies
        working-directory: ./autowala-admin
        run: npm ci

      - name: Run ESLint
        working-directory: ./autowala-admin
        run: npm run lint

      - name: Run TypeScript type checking
        working-directory: ./autowala-admin
        run: npx tsc --noEmit

      - name: Build production bundle
        working-directory: ./autowala-admin
        run: npm run build
        env:
          REACT_APP_API_URL: https://api.autowala.com
          REACT_APP_ENVIRONMENT: production

      - name: Run bundle analyzer (optional)
        working-directory: ./autowala-admin
        run: |
          npx webpack-bundle-analyzer dist/static/js/*.js --report --mode static --no-open || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: autowala-admin/package-lock.json

      - name: Install dependencies
        working-directory: ./autowala-admin
        run: npm ci

      - name: Run npm audit
        working-directory: ./autowala-admin
        run: npm audit --audit-level high

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './autowala-admin'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [test-and-build, security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd autowala-admin
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition $ECS_TASK_DEFINITION --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: autowala-admin
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Clear CloudFront cache (if using CloudFront)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Verify deployment
        run: |
          sleep 30
          response=$(curl -s -o /dev/null -w "%{http_code}" https://admin.autowala.com/health)
          if [ $response -eq 200 ]; then
            echo "✅ Admin panel is responding correctly"
          else
            echo "❌ Admin panel health check failed with status: $response"
            exit 1
          fi

  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --config-path=./autowala-admin/.lighthouse-ci.json \
            --upload-target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [build-and-deploy, performance-test]
    if: always()

    steps:
      - name: Notify Slack on success
        if: needs.build-and-deploy.result == 'success' && needs.performance-test.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "✅ AutoWala Admin Panel deployed successfully to production!"
          SLACK_TITLE: Deployment Success
          SLACK_COLOR: good

      - name: Notify Slack on failure
        if: needs.build-and-deploy.result == 'failure' || needs.performance-test.result == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "❌ AutoWala Admin Panel deployment failed!"
          SLACK_TITLE: Deployment Failed
          SLACK_COLOR: danger

      - name: Create GitHub release on success
        if: needs.build-and-deploy.result == 'success' && github.event_name == 'push'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: admin-v${{ github.run_number }}
          release_name: Admin Panel Release v${{ github.run_number }}
          body: |
            ## AutoWala Admin Panel Release

            **Deployed:** ${{ github.sha }}
            **Environment:** Production
            **URL:** https://admin.autowala.com

            ### Changes in this release:
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false