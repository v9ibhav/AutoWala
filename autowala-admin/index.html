<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AutoWala Admin Panel - Professional dashboard for platform management" />
    <title>AutoWala Admin Panel</title>

    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Meta tags for better SEO and social sharing -->
    <meta property="og:title" content="AutoWala Admin Panel" />
    <meta property="og:description" content="Professional dashboard for managing the AutoWala ride-sharing platform" />
    <meta property="og:type" content="website" />

    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#22c55e" />

    <style>
      /* Loading screen styles */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-logo {
        width: 64px;
        height: 64px;
        background: #22c55e;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        animation: pulse 2s ease-in-out infinite;
      }

      .loading-text {
        color: #166534;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .loading-subtitle {
        color: #16a34a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        font-size: 14px;
        font-weight: 400;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 17H21C21.5523 17 22 16.5523 22 16V10C22 9.44772 21.5523 9 21 9H19M19 17V19C19 19.5523 18.5523 20 18 20H14M19 17H17M5 17H3C2.44772 17 2 16.5523 2 16V10C2 9.44772 2.44772 9 3 9H5M5 17V19C5 19.5523 5.44772 20 6 20H10M5 17H7M14 20V18M10 20V18M14 20H16M10 20H8M17 17V15M7 17V15M17 15H19M7 15H5M17 15V13M7 15V13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="loading-text">AutoWala Admin</div>
      <div class="loading-subtitle">Loading dashboard...</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Hide loading screen once the app is loaded
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
              loadingScreen.remove();
            }, 300);
          }
        }, 500);
      });

      // Error handling for failed loads
      window.addEventListener('error', function(e) {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          const loadingText = loadingScreen.querySelector('.loading-text');
          const loadingSubtitle = loadingScreen.querySelector('.loading-subtitle');
          if (loadingText) loadingText.textContent = 'Loading Error';
          if (loadingSubtitle) loadingSubtitle.textContent = 'Please refresh the page';
        }
      });
    </script>
  </body>
</html>
